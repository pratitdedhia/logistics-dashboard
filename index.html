<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FleetOS — AI-Powered Logistics & Route Optimization Suite</title>
<meta name="description" content="FleetOS: industry-grade fleet management with ML-based ETA prediction, smart auto-assignment, multi-stop route optimization, maintenance scheduling, capacity-aware co-loading, fuel costing, and live map." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<aside id="sidebar">
  <div class="brand">
    <div class="logo">F</div>
    <div>
      <div class="brand-name">FleetOS</div>
      <div class="brand-sub">Logistics Suite</div>
    </div>
  </div>
  <nav class="nav">
    <button class="nav-item active" data-view="dashboard"><span>◐</span> Dashboard</button>
    <button class="nav-item" data-view="trucks"><span>⛟</span> Trucks</button>
    <button class="nav-item" data-view="drivers"><span>☻</span> Drivers</button>
    <button class="nav-item" data-view="depots"><span>⌂</span> Depots</button>
    <button class="nav-item" data-view="orders"><span>✉</span> Orders</button>
    <button class="nav-item" data-view="planner"><span>✦</span> Trip Planner</button>
    <button class="nav-item" data-view="trips"><span>↗</span> Trips</button>
    <button class="nav-item" data-view="maintenance"><span>✦</span> Maintenance</button>
    <button class="nav-item" data-view="map"><span>◉</span> Live Map</button>
    <button class="nav-item" data-view="reports"><span>≡</span> Reports</button>
    <button class="nav-item" data-view="settings"><span>⚙</span> Settings</button>
  </nav>
  <div class="side-footer">
    <div class="side-stat"><b id="ss-trucks">0</b> trucks · <b id="ss-orders">0</b> orders</div>
    <div class="side-stat small">v2.0 · ML-powered</div>
  </div>
</aside>

<main id="main">
  <header class="topbar">
    <div>
      <h1 id="view-title">Dashboard</h1>
      <div class="crumb" id="view-sub">Operational overview</div>
    </div>
    <div class="topbar-actions">
      <input type="search" id="global-search" placeholder="Search trucks, orders, drivers..." />
      <button class="btn ghost" id="btn-seed" title="Load sample data">Seed Demo</button>
      <button class="btn ghost" id="btn-export" title="Download JSON backup">Export</button>
      <button class="btn ghost" id="btn-import" title="Restore JSON backup">Import</button>
      <input type="file" id="file-import" accept="application/json" hidden />
      <button class="btn danger ghost" id="btn-reset" title="Wipe all data">Reset</button>
    </div>
  </header>

  <section id="view-root"></section>
</main>

<div id="modal-root"></div>
<div id="toast-root"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="app.js" defer></script>
</body>
</html>
